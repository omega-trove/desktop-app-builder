<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega Track - Login</title>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const errInfo = "Uncaught Error: " + message + "\nSource: " + source + "\nLine: " + lineno + ":" + colno + "\nStack: " + (error ? error.stack : 'none');
            console.error(errInfo);
            if (window.electronAPI && window.electronAPI.logError) {
                window.electronAPI.logError(errInfo);
            }
            alert(errInfo);
        };
        window.addEventListener('unhandledrejection', function (event) {
            const errInfo = "Unhandled Rejection: " + event.reason + "\nStack: " + (event.reason && event.reason.stack ? event.reason.stack : 'none');
            console.error(errInfo);
            if (window.electronAPI && window.electronAPI.logError) {
                window.electronAPI.logError(errInfo);
            }
            alert(errInfo);
        });
    </script>
    
    <!-- Premium Cross-Platform Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4645E4;
            --primary-light: #6B6AF0;
            --primary-dark: #3736B6;
            --secondary: #FF8430;        /* orange accent */
            --primary-glow: rgba(70, 69, 228, 0.25);
            --bg-body: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.85);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-light: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: #4645E4;
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(70, 69, 228, 0.12) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(70, 69, 228, 0.06) 0px, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Glassmorphic Dark Login Card */
        .login-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 30px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(17, 24, 39, 0.5);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            color: #fff;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: var(--text-light);
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(17, 24, 39, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 132, 48, 0.20);
        }

        /* Language dropdown styling */
        select {
            padding: 6px 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(17, 24, 39, 0.6);
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        select:hover {
            border-color: var(--secondary);
            background: rgba(17, 24, 39, 0.9);
        }

        select option {
            background: #111827;
            color: #fff;
        }

        /* High-End Button Layout */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 15px;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        button:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255, 132, 48, 0.35);
        }
        
        button:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 500;
            display: none;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 8px;
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
            <select id="langSelect">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
        </div>
        <img src="../../../assets/ot-mark.svg" alt="Omega Track" width="56" height="56" style="display:block; margin:0 auto 10px;">
        <div class="logo">Omega Tracker</div>
        <div class="subtitle" data-i18n="subtitle">Omega Track Desktop Client</div>

        <div class="form-group">
            <label for="email" data-i18n="email_label">Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
            <label for="password" data-i18n="password_label">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button id="loginBtn" data-i18n="login_title">Sign In</button>
        <div class="error-msg" id="errorMsg" data-i18n="invalid_credentials">Invalid credentials.</div>
    </div>

    <!-- UI Logic -->
    <script src="../js/i18n.js"></script>
    <script src="../js/login-renderer.js"></script>
</body>
</html>
